spring:
  application:
    name: realtimechat

  datasource:
#    url: jdbc:h2:mem:testdb
#    temporary in-file database for testing
    url: jdbc:h2:file:./data/realtimechat
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    jwt:
      private-key: classpath:keys/jwt-private.key
      public-key: classpath:keys/jwt-public.key

server:
  address: 0.0.0.0
  port: 8080