spring:
  application:
    name: realtimechat

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/realtimechat}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    jwt:
      private-key: classpath:keys/jwt-private.key
      public-key: classpath:keys/jwt-public.key

server:
  address: 0.0.0.0
  port: ${PORT:8080}
